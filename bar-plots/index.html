<!DOCTYPE html>

<html>

<head>
    <title>Iris Bar Charts</title>
</head>

<body>
    <header>
        <h1 style="text-align: center; font-family: Arial, sans-serif;">Iris Bar Charts</h1>
        <p style="text-align: center; font-family: Arial, sans-serif; margin-bottom: 30px;">Average Petal Width by Species</p>
    </header>
    <div id="bar-grid"></div>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script>
        const width = 360;
        const height = 360;
        const margin = { top: 30, right: 20, bottom: 40, left: 50 };
        const growAmount = 10;

        const chartConfigs = [
            {
                title: "Random Colors + Hover Labels",
                colorMode: "random",
                labels: "hover"
            },
            {
                title: "Purple Ombre + Hover Labels",
                colorMode: "purple",
                labels: "hover"
            },
            {
                title: "Random Colors + Always Visible Labels",
                colorMode: "random",
                labels: "always"
            },
            {
                title: "Purple Ombre + Always Visible Labels",
                colorMode: "purple",
                labels: "always"
            }
        ];

        const randomColors = ["#FF6B6B", "#4ECDC4", "#FFD93D"];
        const purpleColors = ["#D8B4FE", "#C58FF7", "#AB5DF5"];

        d3.csv("../Iris.csv").then(data => {

            // Compute average PetalWidthCm per species
            const speciesAvg = Array.from(
                d3.rollup(
                    data,
                    v => d3.mean(v, d => +d.PetalWidthCm),
                    d => d.Species
                ),
                ([species, value]) => ({ species, value })
            );

            const container = d3.select("#bar-grid")
                .style("display", "grid")
                .style("grid-template-columns", "repeat(2, 1fr)")
                .style("gap", "35px")
                .style("max-width", "700px")
                .style("margin", "0 auto")
                .style("font-family", "Arial, sans-serif");

            chartConfigs.forEach(config => {

                const colorScale = d3.scaleOrdinal()
                    .domain(speciesAvg.map(d => d.species))
                    .range(config.colorMode === "purple" ? purpleColors : randomColors);

                const chartDiv = container.append("div")
                    .style("text-align", "center");

                chartDiv.append("h3")
                    .text(config.title)
                    .style("font-size", "15px")
                    .style("margin-bottom", "8px");

                const svg = chartDiv.append("svg")
                    .attr("width", width)
                    .attr("height", height);

                const x = d3.scaleBand()
                    .domain(speciesAvg.map(d => d.species))
                    .range([margin.left, width - margin.right])
                    .padding(0.2);

                const y = d3.scaleLinear()
                    .domain([0, d3.max(speciesAvg, d => d.value)])
                    .nice()
                    .range([height - margin.bottom, margin.top]);

                // Axes
                svg.append("g")
                    .attr("transform", `translate(0,${height - margin.bottom})`)
                    .call(d3.axisBottom(x));

                svg.append("g")
                    .attr("transform", `translate(${margin.left},0)`)
                    .call(d3.axisLeft(y));

                // Bars
                const bars = svg.selectAll("rect")
                    .data(speciesAvg)
                    .enter()
                    .append("rect")
                    .attr("x", d => x(d.species))
                    .attr("y", d => y(d.value))
                    .attr("width", x.bandwidth())
                    .attr("height", d => y(0) - y(d.value))
                    .attr("fill", d => colorScale(d.species));

                // Labels
                const labels = svg.selectAll(".label")
                    .data(speciesAvg)
                    .enter()
                    .append("text")
                    .attr("class", "label")
                    .attr("x", d => x(d.species) + x.bandwidth() / 2)
                    .attr("y", d => y(d.value) - 5)
                    .attr("text-anchor", "middle")
                    .style("font-size", "12px")
                    .style("font-weight", "bold")
                    .style("opacity", config.labels === "always" ? 1 : 0)
                    .text(d => d.value.toFixed(2));

                // Hover interaction (bars grow + labels move)
                bars
                    .on("mouseover", function (event, d) {
                        d3.select(this)
                            .transition()
                            .duration(200)
                            .attr("y", y(d.value) - growAmount)
                            .attr("height", (y(0) - y(d.value)) + growAmount)
                            .attr("stroke", "black")
                            .attr("stroke-width", 2);

                        const label = labels.filter(ld => ld.species === d.species);

                        label
                            .transition()
                            .duration(200)
                            .attr("y", y(d.value) - growAmount - 5);

                        if (config.labels === "hover") {
                            label.style("opacity", 1);
                        }
                    })
                    .on("mouseout", function (event, d) {
                        d3.select(this)
                            .transition()
                            .duration(200)
                            .attr("y", y(d.value))
                            .attr("height", y(0) - y(d.value))
                            .attr("stroke", "none");

                        const label = labels.filter(ld => ld.species === d.species);

                        label
                            .transition()
                            .duration(200)
                            .attr("y", y(d.value) - 5);

                        if (config.labels === "hover") {
                            label.style("opacity", 0);
                        }
                    });
            });
        });
    </script>


</body>

</html>
