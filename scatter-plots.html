<!--measures petal length/width, each species = point shape-->
<!DOCTYPE html>
<meta charset="UTF-8">
<html>

<head>
    <title>Iris Scatter Plots</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        #scatter-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 35px;
            max-width: 750px;
            margin: 0 auto;
        }

        .chart-container {
            text-align: center;
        }

        .chart-container h3 {
            font-size: 15px;
            margin-bottom: 4px;
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 14px;
            margin-bottom: 6px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            color: #555;
        }

        .tooltip {
            position: fixed;
            background: white;
            border: 1px solid #ccc;
            border-radius: 6px;
            padding: 6px 10px;
            font-size: 11px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s;
            white-space: nowrap;
            z-index: 10;
        }

        nav {
            margin-top: 25px;
            text-align: center;
        }

        nav a {
            text-decoration: none;
            color: #444;
            background-color: #f0f0f0;
            margin: 0 12px;
            padding: 8px 14px;
            border-radius: 8px;
            transition: 0.2s;
        }

        nav a:hover {
            background-color: #e5e7eb;
        }
    </style>
</head>

<body>
    <header>
        <h1 style="text-align: center; font-family: Arial, sans-serif;">Iris Scatter Plots</h1>
    </header>
    <nav>
        <a href="index.html">Home</a>
    </nav>

    <div id="scatter-grid"></div>
    <div class="tooltip" id="tooltip"></div>

    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script>
        const margin = { top: 10, right: 20, bottom: 45, left: 45 };
        const width = 300;
        const height = 270;
        const innerW = width - margin.left - margin.right;
        const innerH = height - margin.top - margin.bottom;

        const randomColors = {
            setosa: "#FF6B6B",
            versicolor: "#4ECDC4",
            virginica: "#FFD93D"
        };

        const purpleColors = {
            setosa: "#D8B4FE",
            versicolor: "#C58FF7",
            virginica: "#7C3AED"
        };

        const chartConfigs = [
            { title: "Random Colors + Hover Labels", colorMode: "random", labels: "hover" },
            { title: "Purple Ombre + Hover Labels", colorMode: "purple", labels: "hover" },
            { title: "Random Colors + Always Visible Labels", colorMode: "random", labels: "always" },
            { title: "Purple Ombre + Always Visible Labels", colorMode: "purple", labels: "always" }
        ];

        const speciesShapes = {
            setosa: "triangle",
            versicolor: "circle",
            virginica: "square"
        };

        const tooltip = d3.select("#tooltip");

        d3.csv("Iris.csv").then(rawData => {
            const data = rawData.map(d => ({
                petalwidth: +d.PetalWidthCm,
                petallength: +d.PetalLengthCm,
                species: d.Species.replace("Iris-", "")
            }));

            const species = Array.from(new Set(data.map(d => d.species)));

            const xScale = d3.scaleLinear()
                .domain([d3.min(data, d => d.petalwidth) - 0.1, d3.max(data, d => d.petalwidth) + 0.1])
                .range([0, innerW]);

            const yScale = d3.scaleLinear()
                .domain([d3.min(data, d => d.petallength) - 0.2, d3.max(data, d => d.petallength) + 0.2])
                .range([innerH, 0]);

            const container = d3.select("#scatter-grid");

            chartConfigs.forEach(config => {
                const colorMap = config.colorMode === "purple" ? purpleColors : randomColors;

                const chartDiv = container.append("div").attr("class", "chart-container");

                chartDiv.append("h3").text(config.title);

                // Legend
                const legend = chartDiv.append("div").attr("class", "legend");
                species.forEach(sp => {
                    const item = legend.append("span").attr("class", "legend-item");
                    const color = colorMap[sp];
                    const shape = speciesShapes[sp];
                    const legendSvg = item.append("svg")
                        .attr("width", 12).attr("height", 12)
                        .style("display", "inline-block")
                        .style("vertical-align", "middle");

                    if (shape === "triangle") {
                        legendSvg.append("polygon")
                            .attr("points", "6,1 11,10 1,10")
                            .attr("fill", color);
                    } else if (shape === "circle") {
                        legendSvg.append("circle")
                            .attr("cx", 6).attr("cy", 6).attr("r", 5)
                            .attr("fill", color);
                    } else {
                        legendSvg.append("rect")
                            .attr("x", 1).attr("y", 1)
                            .attr("width", 10).attr("height", 10)
                            .attr("fill", color);
                    }
                    item.append("span").text(
                        sp.charAt(0).toUpperCase() + sp.slice(1) +
                        (shape === "triangle" ? " (▲)" : shape === "circle" ? " (●)" : " (■)")
                    );
                });

                // SVG
                const svg = chartDiv.append("svg")
                    .attr("width", width)
                    .attr("height", height);

                const g = svg.append("g")
                    .attr("transform", `translate(${margin.left},${margin.top})`);

                // Grid lines
                g.append("g").attr("class", "grid")
                    .selectAll("line.x")
                    .data(xScale.ticks(5))
                    .enter().append("line")
                    .attr("x1", d => xScale(d)).attr("x2", d => xScale(d))
                    .attr("y1", 0).attr("y2", innerH)
                    .attr("stroke", "rgba(0,0,0,0.06)");

                g.append("g").attr("class", "grid")
                    .selectAll("line.y")
                    .data(yScale.ticks(5))
                    .enter().append("line")
                    .attr("x1", 0).attr("x2", innerW)
                    .attr("y1", d => yScale(d)).attr("y2", d => yScale(d))
                    .attr("stroke", "rgba(0,0,0,0.06)");

                // Axes
                g.append("g")
                    .attr("transform", `translate(0,${innerH})`)
                    .call(d3.axisBottom(xScale).ticks(5).tickSize(0))
                    .call(ax => {
                        ax.select(".domain").attr("stroke", "#aaa");
                        ax.selectAll("text").style("font-size", "10px").style("fill", "#555");
                    });

                g.append("g")
                    .call(d3.axisLeft(yScale).ticks(5).tickSize(0))
                    .call(ax => {
                        ax.select(".domain").attr("stroke", "#aaa");
                        ax.selectAll("text").style("font-size", "10px").style("fill", "#555");
                    });

                // Axis labels
                g.append("text")
                    .attr("x", innerW / 2).attr("y", innerH + 36)
                    .attr("text-anchor", "middle")
                    .style("font-size", "11px").style("fill", "#555")
                    .text("Petal width (cm)");

                g.append("text")
                    .attr("transform", "rotate(-90)")
                    .attr("x", -innerH / 2).attr("y", -34)
                    .attr("text-anchor", "middle")
                    .style("font-size", "11px").style("fill", "#555")
                    .text("Petal length (cm)");

                // Data points
                const points = g.selectAll(".point")
                    .data(data)
                    .enter()
                    .append("g")
                    .attr("class", "point")
                    .attr("transform", d => `translate(${xScale(d.petalwidth)},${yScale(d.petallength)})`)
                    .style("cursor", "pointer");

                points.each(function (d) {
                    const pt = d3.select(this);
                    const color = colorMap[d.species];
                    const shape = speciesShapes[d.species];

                    if (shape === "triangle") {
                        pt.append("polygon")
                            .attr("points", "0,-6 5.2,3 -5.2,3")
                            .attr("fill", color)
                            .attr("stroke", "white")
                            .attr("stroke-width", 1);
                    } else if (shape === "circle") {
                        pt.append("circle")
                            .attr("r", 4.5)
                            .attr("fill", color)
                            .attr("stroke", "white")
                            .attr("stroke-width", 1);
                    } else {
                        pt.append("rect")
                            .attr("x", -4).attr("y", -4)
                            .attr("width", 8).attr("height", 8)
                            .attr("fill", color)
                            .attr("stroke", "white")
                            .attr("stroke-width", 1);
                    }

                    // Always-visible labels
                    if (config.labels === "always") {
                        pt.append("text")
                            .attr("y", -9)
                            .attr("text-anchor", "middle")
                            .style("font-size", "8px")
                            .style("fill", "#555")
                            .style("pointer-events", "none")
                            .text(`${d.petalwidth}, ${d.petallength}`);
                    }
                });

                // Tooltip hover (all charts)
                points
                    .on("mouseover", function (event, d) {
                        const color = colorMap[d.species];
                        tooltip
                            .style("opacity", 1)
                            .style("left", (event.clientX + 12) + "px")
                            .style("top", (event.clientY - 28) + "px")
                            .html(`<strong style="color:${color}">${d.species}</strong><br>
                       Width: ${d.petalwidth} cm &nbsp;·&nbsp; Length: ${d.petallength} cm`);
                    })
                    .on("mousemove", function (event) {
                        tooltip
                            .style("left", (event.clientX + 12) + "px")
                            .style("top", (event.clientY - 28) + "px");
                    })
                    .on("mouseout", () => tooltip.style("opacity", 0));
            });
        });
    </script>
</body>

</html>
